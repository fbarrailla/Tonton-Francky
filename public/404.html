<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tonton Francky</title>
    <script>
      // SPA redirect for GitHub Pages: encode the full path into the query string
      // so index.html can restore it via history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
