server {
    listen 80;
    listen [::]:80;
    server_name tontonfrancky.com www.tontonfrancky.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tontonfrancky.com www.tontonfrancky.com;

    # Update this path to match the dist folder on your server
    root /home/francois/Tonton-Francky/dist;
    index index.html;

    # SSL — update certificate paths if needed
    ssl_certificate     /etc/letsencrypt/live/tontonfrancky.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tontonfrancky.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               application/woff2 image/svg+xml;

    # index.html — revalidate on every request so deploys propagate immediately
    # no-cache (not no-store) allows bfcache while still forcing revalidation
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # Vite hashed assets (JS, CSS, images, video) — cache 1 year
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary          "Accept-Encoding";
        expires 1y;
    }

    # Self-hosted fonts — cache 1 year
    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary          "Accept-Encoding";
        expires 1y;
    }

    # Other static files (favicon, robots.txt, sitemap.xml) — cache 1 day
    location ~* \.(ico|png|xml|txt)$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # API — proxy to Express (PM2, port 3001)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
