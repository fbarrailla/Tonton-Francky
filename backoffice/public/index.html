<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tonton Francky — Backoffice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f1;
      --surface: #ffffff;
      --border: #e5e3df;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #b45309;
      --accent-hover: #92400e;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header .logo { font-weight: 700; font-size: 1rem; }
    header .sep { color: var(--border); }
    header .page { color: var(--muted); font-size: .9rem; }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Stats */
    .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; flex: 1; min-width: 160px; }
    .stat-card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
    .tab { padding: 7px 20px; border-radius: 7px; font-size: .875rem; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .15s; }
    .tab.active { background: var(--accent); color: #fff; }
    .tab:not(.active):hover { background: var(--bg); color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Toolbar */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
    .toolbar h2 { font-size: 1rem; font-weight: 600; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: .875rem; font-weight: 600; cursor: pointer; border: none; transition: background .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 5px 10px; font-size: .8rem; border-radius: 6px; }

    /* Table */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg); }
    th { text-align: left; padding: 12px 16px; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    td { padding: 13px 16px; font-size: .875rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf9; }
    .actions { display: flex; gap: 6px; }
    .empty { text-align: center; padding: 48px; color: var(--muted); }

    .price-cell { font-variant-numeric: tabular-nums; font-weight: 600; }
    .product-badge { display: inline-block; background: #fef3c7; color: #92400e; border-radius: 99px; padding: 2px 10px; font-size: .75rem; font-weight: 600; }

    /* Inline add row for newsletter */
    .add-row td { background: #fffbeb; border-top: 2px solid #fde68a; }
    .add-row input { width: 100%; padding: 7px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: .875rem; outline: none; background: #fff; }
    .add-row input:focus { border-color: var(--accent); }

    /* Copy button */
    .copy-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: .8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all .15s; }
    .copy-btn:hover { background: var(--surface); color: var(--text); }

    /* Modal */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(0,0,0,.18); animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; outline: none; background: var(--bg); transition: border-color .15s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
    .delete-modal p { color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
    .delete-modal .name { font-weight: 700; color: var(--text); }

    /* Compose card */
    .compose-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; box-shadow: var(--shadow); }
    .compose-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
    .compose-card .form-group input { background: var(--bg); }
    .compose-actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
    .compose-actions .send-info { font-size: .8rem; color: var(--muted); }

    /* Quill overrides */
    .ql-toolbar.ql-snow { border: 1px solid var(--border); border-radius: 8px 8px 0 0; background: var(--bg); font-family: inherit; }
    .ql-container.ql-snow { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; font-family: inherit; font-size: .9rem; }
    .ql-editor { min-height: 200px; }
    .ql-editor.ql-blank::before { color: var(--muted); font-style: normal; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; background: var(--text); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: .875rem; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    /* Login screen */
    #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; }
    #login-screen.hidden { display: none; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 360px; box-shadow: var(--shadow); }
    .login-card h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .login-card p { font-size: .85rem; color: var(--muted); margin-bottom: 28px; }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card .form-group input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: .95rem; outline: none; background: var(--bg); transition: border-color .15s; }
    .login-card .form-group input:focus { border-color: var(--accent); background: #fff; }
    .login-card .btn { width: 100%; justify-content: center; padding: 11px; font-size: .95rem; }
    .login-error { font-size: .82rem; color: var(--danger); margin-top: 10px; min-height: 18px; }

    /* Logout btn */
    .logout-btn { margin-left: auto; padding: 5px 14px; border-radius: 7px; font-size: .8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .15s; }
    .logout-btn:hover { background: var(--bg); color: var(--danger); border-color: #fca5a5; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-card">
    <h1>Tonton Francky</h1>
    <p>Backoffice — accès restreint</p>
    <div class="form-group">
      <input type="password" id="login-password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')submitLogin()" autofocus />
    </div>
    <button class="btn btn-primary" onclick="submitLogin()">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header>
  <span class="logo">Tonton Francky</span>
  <span class="sep">›</span>
  <span class="page">Backoffice</span>
  <button class="logout-btn" onclick="logout()">Déconnexion</button>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total orders</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Total revenue</div>
      <div class="value" id="stat-revenue">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Subscribers</div>
      <div class="value" id="stat-subscribers">—</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders')">Orders</button>
    <button class="tab" onclick="switchTab('newsletter')">Newsletter</button>
  </div>

  <!-- Orders tab -->
  <div class="tab-panel active" id="tab-orders">
    <div class="toolbar">
      <h2>Orders</h2>
      <button class="btn btn-primary" onclick="openCreate()">+ New order</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Product</th><th>Customer</th><th>Date</th><th>Price</th><th></th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="6" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Newsletter tab -->
  <div class="tab-panel" id="tab-newsletter">

    <!-- Compose -->
    <div class="compose-card">
      <h2>Send newsletter</h2>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" id="newsletter-subject" placeholder="Your newsletter subject…" />
      </div>
      <div class="form-group">
        <label>Message</label>
        <div id="newsletter-editor"></div>
      </div>
      <div class="compose-actions">
        <button class="btn btn-primary" id="send-btn" onclick="sendNewsletter()">Send to all subscribers</button>
        <span class="send-info" id="send-info"></span>
      </div>
    </div>

    <div class="toolbar">
      <h2 id="sub-count-label">Subscribers</h2>
      <div style="display:flex;gap:8px">
        <button class="copy-btn" onclick="copyAllEmails()">⎘ Copy all emails</button>
        <button class="btn btn-primary" onclick="showAddRow()">+ Add email</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Email</th><th>Subscribed on</th><th></th></tr>
        </thead>
        <tbody id="subscribers-body">
          <tr><td colspan="4" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Order create/edit modal -->
<div class="modal-backdrop" id="form-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">New order</h3>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>Product</label>
      <select id="f-product">
        <option value="ebook">E-book — Crée ton site web avec Claude Code</option>
      </select>
    </div>
    <div class="form-group">
      <label>Customer name</label>
      <input type="text" id="f-customer" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="f-date" />
    </div>
    <div class="form-group">
      <label>Price ($)</label>
      <input type="number" id="f-price" step="0.01" min="0" placeholder="9.99" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('form-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveOrder()">Save</button>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-backdrop" id="delete-modal" onclick="closeModal('delete-modal')">
  <div class="modal delete-modal" onclick="event.stopPropagation()">
    <h3 id="delete-modal-title">Delete</h3>
    <p>Are you sure you want to delete <span class="name" id="delete-name"></span>? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ── Supabase client ───────────────────────────────────────────
  let db;
  (async () => {
    db = window.supabase.createClient('https://dufftgmvjjtlyfqwdsyp.supabase.co', 'sb_publishable_1hywiIeUxTa6_5IuZK0l-w_WwOy7rCD');
  })();

  // ── EmailJS config ────────────────────────────────────────────
  const EMAILJS_PUBLIC_KEY  = '-BGhKDSFxI8D8E1hT';
  const EMAILJS_SERVICE_ID  = 'service_nop1bn9';
  const EMAILJS_TEMPLATE_ID = 'template_tr5eo3d';
  // Template variables: {{subject}}, {{message}}, {{bcc}}
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

  // ── Quill ─────────────────────────────────────────────────────
  const quill = new Quill('#newsletter-editor', {
    theme: 'snow',
    placeholder: 'Write your newsletter…',
    modules: {
      toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['link', 'blockquote'],
        ['clean'],
      ],
    },
  });

  let deleteTargetId = null;
  let deleteTargetType = null;

  // ── Auth ─────────────────────────────────────────────────────
  const TOKEN_KEY = 'bo_token';

  function getToken() { return localStorage.getItem(TOKEN_KEY); }

  async function submitLogin() {
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    if (!res.ok) { errEl.textContent = 'Mot de passe incorrect.'; return; }
    const { token } = await res.json();
    localStorage.setItem(TOKEN_KEY, token);
    document.getElementById('login-screen').classList.add('hidden');
    initApp();
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    location.reload();
  }

  // ── API ──────────────────────────────────────────────────────
  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: {
        ...(body ? { 'Content-Type': 'application/json' } : {}),
        'Authorization': `Bearer ${getToken()}`,
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) { logout(); return null; }
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Toast ────────────────────────────────────────────────────
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.className = 'toast', 2500);
  }

  // ── Tabs ─────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // ── Stats ────────────────────────────────────────────────────
  async function loadStats() {
    const { total, revenue, subscribers } = await api('GET', '/api/stats');
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-revenue').textContent = '$' + Number(revenue).toFixed(2);
    document.getElementById('stat-subscribers').textContent = subscribers;
  }

  // ── Orders ───────────────────────────────────────────────────
  async function loadOrders() {
    const { data: orders, error } = await db
      .from('orders')
      .select('*')
      .order('date', { ascending: false });
    if (error) { console.error('[Supabase]', error.message); return; }
    const tbody = document.getElementById('orders-body');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No orders yet.</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">#${o.id}</td>
        <td><span class="product-badge">${o.product}</span></td>
        <td>${escHtml(o.customer)}</td>
        <td>${new Date(o.date).toLocaleDateString('en-CA')}</td>
        <td class="price-cell">$${Number(o.price).toFixed(2)}</td>
        <td><div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${o.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="openDelete('order', ${o.id}, '${escAttr(o.customer)}')">Delete</button>
        </div></td>
      </tr>`).join('');
  }

  function openCreate() {
    document.getElementById('modal-title').textContent = 'New order';
    document.getElementById('edit-id').value = '';
    document.getElementById('f-product').value = 'ebook';
    document.getElementById('f-customer').value = '';
    document.getElementById('f-date').value = today();
    document.getElementById('f-price').value = '9.99';
    openModal('form-modal');
  }

  async function openEdit(id) {
    const o = await api('GET', `/api/orders/${id}`);
    document.getElementById('modal-title').textContent = 'Edit order';
    document.getElementById('edit-id').value = o.id;
    document.getElementById('f-product').value = o.product;
    document.getElementById('f-customer').value = o.customer;
    document.getElementById('f-date').value = o.date;
    document.getElementById('f-price').value = o.price;
    openModal('form-modal');
  }

  async function saveOrder() {
    const id = document.getElementById('edit-id').value;
    const body = {
      product:  document.getElementById('f-product').value,
      customer: document.getElementById('f-customer').value.trim(),
      date:     document.getElementById('f-date').value,
      price:    parseFloat(document.getElementById('f-price').value),
    };
    if (!body.customer || !body.date || isNaN(body.price)) {
      toast('Please fill all fields.', 'error'); return;
    }
    await api(id ? 'PUT' : 'POST', id ? `/api/orders/${id}` : '/api/orders', body);
    toast(id ? 'Order updated.' : 'Order created.', 'success');
    closeModal('form-modal');
    await loadOrders(); loadStats();
  }

  // ── Subscribers ───────────────────────────────────────────────
  let subscribersCache = [];

  async function loadSubscribers() {
    subscribersCache = await api('GET', '/api/subscribers');
    const tbody = document.getElementById('subscribers-body');
    document.getElementById('sub-count-label').textContent =
      `Subscribers (${subscribersCache.length})`;
    document.getElementById('send-info').textContent =
      subscribersCache.length ? `Will be sent to ${subscribersCache.length} subscriber${subscribersCache.length > 1 ? 's' : ''} via BCC` : '';

    if (!subscribersCache.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No subscribers yet.</td></tr>';
      return;
    }
    tbody.innerHTML = subscribersCache.map((s, i) => `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">${i + 1}</td>
        <td>${escHtml(s.email)}</td>
        <td style="color:var(--muted)">${s.created_at.slice(0, 10)}</td>
        <td><div class="actions">
          <button class="btn btn-danger btn-sm" onclick="openDelete('subscriber', ${s.id}, '${escAttr(s.email)}')">Remove</button>
        </div></td>
      </tr>`).join('');
  }

  function showAddRow() {
    // Remove any existing add row first
    document.getElementById('add-email-row')?.remove();
    const tbody = document.getElementById('subscribers-body');
    const tr = document.createElement('tr');
    tr.id = 'add-email-row';
    tr.className = 'add-row';
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:.8rem">—</td>
      <td><input type="email" id="new-email-input" placeholder="email@example.com" onkeydown="if(event.key==='Enter')submitNewEmail();if(event.key==='Escape')cancelAddRow();" /></td>
      <td style="color:var(--muted)">—</td>
      <td><div class="actions">
        <button class="btn btn-primary btn-sm" onclick="submitNewEmail()">Add</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelAddRow()">Cancel</button>
      </div></td>`;
    tbody.prepend(tr);
    document.getElementById('new-email-input').focus();
  }

  function cancelAddRow() {
    document.getElementById('add-email-row')?.remove();
  }

  async function submitNewEmail() {
    const input = document.getElementById('new-email-input');
    const email = input.value.trim();
    if (!email) return;
    const result = await api('POST', '/api/subscribers', { email });
    if (result?.error) { toast(result.error, 'error'); return; }
    cancelAddRow();
    toast('Subscriber added.', 'success');
    loadSubscribers(); loadStats();
  }

  // ── Newsletter send ───────────────────────────────────────────
  async function sendNewsletter() {
    const subject = document.getElementById('newsletter-subject').value.trim();
    const html = quill.root.innerHTML;
    const isEmpty = quill.getText().trim().length === 0;

    if (!subject) { toast('Please enter a subject.', 'error'); return; }
    if (isEmpty)  { toast('Please write a message.', 'error'); return; }
    if (!subscribersCache.length) { toast('No subscribers to send to.', 'error'); return; }

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        subject,
        email: html,
        bcc: subscribersCache.map(s => s.email).join(','),
      });
      toast(`Newsletter sent to ${subscribersCache.length} subscribers!`, 'success');
    } catch (err) {
      console.error(err);
      toast('Failed to send newsletter.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send to all subscribers';
    }
  }

  function copyAllEmails() {
    if (!subscribersCache.length) { toast('No emails to copy.', 'error'); return; }
    navigator.clipboard.writeText(subscribersCache.map(s => s.email).join(','));
    toast(`${subscribersCache.length} emails copied!`, 'success');
  }

  // ── Delete (shared) ───────────────────────────────────────────
  function openDelete(type, id, label) {
    deleteTargetId = id;
    deleteTargetType = type;
    document.getElementById('delete-modal-title').textContent =
      type === 'subscriber' ? 'Remove subscriber' : 'Delete order';
    document.getElementById('delete-name').textContent = label;
    openModal('delete-modal');
  }

  async function confirmDelete() {
    const path = deleteTargetType === 'subscriber'
      ? `/api/subscribers/${deleteTargetId}`
      : `/api/orders/${deleteTargetId}`;
    await api('DELETE', path);
    closeModal('delete-modal');
    toast('Deleted.', 'success');
    if (deleteTargetType === 'subscriber') { loadSubscribers(); } else { loadOrders(); }
    loadStats();
  }

  // ── Modal helpers ─────────────────────────────────────────────
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.getElementById('form-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('form-modal');
  });

  // ── Utils ─────────────────────────────────────────────────────
  function today() { return new Date().toISOString().slice(0, 10); }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) { return String(s).replace(/'/g, "\\'"); }

  // ── Init ──────────────────────────────────────────────────────
  function initApp() {
    loadStats();
    loadOrders();
    loadSubscribers();
  }

  if (getToken()) {
    document.getElementById('login-screen').classList.add('hidden');
    initApp();
  }
</script>
</body>
</html>
