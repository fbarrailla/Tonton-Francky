<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tonton Francky — Backoffice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f1;
      --surface: #ffffff;
      --border: #e5e3df;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #b45309;
      --accent-hover: #92400e;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .logo { font-weight: 700; font-size: 1rem; }
    header .sep { color: var(--border); }
    header .page { color: var(--muted); font-size: .9rem; }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Stats */
    .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      flex: 1;
      min-width: 160px;
    }
    .stat-card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }

    /* Toolbar */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
    .toolbar h2 { font-size: 1rem; font-weight: 600; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; font-size: .875rem;
      font-weight: 600; cursor: pointer; border: none; transition: background .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 5px 10px; font-size: .8rem; border-radius: 6px; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg); }
    th {
      text-align: left; padding: 12px 16px;
      font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border);
    }
    td { padding: 13px 16px; font-size: .875rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf9; }
    .actions { display: flex; gap: 6px; }
    .empty { text-align: center; padding: 48px; color: var(--muted); }

    .price-cell { font-variant-numeric: tabular-nums; font-weight: 600; }
    .product-badge {
      display: inline-block; background: #fef3c7; color: #92400e;
      border-radius: 99px; padding: 2px 10px; font-size: .75rem; font-weight: 600;
    }

    /* Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 100;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 16px;
      padding: 32px; width: 100%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .9rem; outline: none;
      background: var(--bg); transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

    /* Delete confirm */
    .delete-modal p { color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
    .delete-modal .name { font-weight: 700; color: var(--text); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: var(--text); color: #fff;
      padding: 12px 20px; border-radius: 10px; font-size: .875rem; font-weight: 500;
      opacity: 0; transform: translateY(8px); transition: all .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <span class="logo">Tonton Francky</span>
  <span class="sep">›</span>
  <span class="page">Backoffice</span>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total orders</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Total revenue</div>
      <div class="value" id="stat-revenue">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <h2>Orders</h2>
    <button class="btn btn-primary" onclick="openCreate()">+ New order</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Product</th>
          <th>Customer</th>
          <th>Date</th>
          <th>Price</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="6" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Create / Edit Modal -->
<div class="modal-backdrop" id="form-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">New order</h3>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>Product</label>
      <select id="f-product">
        <option value="ebook">E-book — Crée ton site web avec Claude Code</option>
      </select>
    </div>
    <div class="form-group">
      <label>Customer name</label>
      <input type="text" id="f-customer" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="f-date" />
    </div>
    <div class="form-group">
      <label>Price ($)</label>
      <input type="number" id="f-price" step="0.01" min="0" placeholder="9.99" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('form-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveOrder()">Save</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-backdrop" id="delete-modal" onclick="closeModal('delete-modal')">
  <div class="modal delete-modal" onclick="event.stopPropagation()">
    <h3>Delete order</h3>
    <p>Are you sure you want to delete the order for <span class="name" id="delete-name"></span>? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let deleteTargetId = null;

  // ── API helpers ──────────────────────────────────────────────
  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : {},
      body: body ? JSON.stringify(body) : undefined,
    });
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Toast ────────────────────────────────────────────────────
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.className = 'toast', 2500);
  }

  // ── Stats ────────────────────────────────────────────────────
  async function loadStats() {
    const { total, revenue } = await api('GET', '/api/stats');
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-revenue').textContent =
      '$' + Number(revenue).toFixed(2);
  }

  // ── Orders table ─────────────────────────────────────────────
  async function loadOrders() {
    const orders = await api('GET', '/api/orders');
    const tbody = document.getElementById('orders-body');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No orders yet. Create your first one!</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">#${o.id}</td>
        <td><span class="product-badge">${o.product}</span></td>
        <td>${escHtml(o.customer)}</td>
        <td>${o.date}</td>
        <td class="price-cell">$${Number(o.price).toFixed(2)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${o.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="openDelete(${o.id}, '${escAttr(o.customer)}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function refresh() { loadOrders(); loadStats(); }

  // ── Modal helpers ─────────────────────────────────────────────
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.getElementById('form-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('form-modal');
  });

  // ── Create ────────────────────────────────────────────────────
  function openCreate() {
    document.getElementById('modal-title').textContent = 'New order';
    document.getElementById('edit-id').value = '';
    document.getElementById('f-product').value = 'ebook';
    document.getElementById('f-customer').value = '';
    document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
    document.getElementById('f-price').value = '9.99';
    openModal('form-modal');
  }

  // ── Edit ──────────────────────────────────────────────────────
  async function openEdit(id) {
    const o = await api('GET', `/api/orders/${id}`);
    document.getElementById('modal-title').textContent = 'Edit order';
    document.getElementById('edit-id').value = o.id;
    document.getElementById('f-product').value = o.product;
    document.getElementById('f-customer').value = o.customer;
    document.getElementById('f-date').value = o.date;
    document.getElementById('f-price').value = o.price;
    openModal('form-modal');
  }

  // ── Save (create or update) ───────────────────────────────────
  async function saveOrder() {
    const id = document.getElementById('edit-id').value;
    const body = {
      product:  document.getElementById('f-product').value,
      customer: document.getElementById('f-customer').value.trim(),
      date:     document.getElementById('f-date').value,
      price:    parseFloat(document.getElementById('f-price').value),
    };
    if (!body.customer || !body.date || isNaN(body.price)) {
      toast('Please fill all fields.', 'error'); return;
    }
    if (id) {
      await api('PUT', `/api/orders/${id}`, body);
      toast('Order updated.', 'success');
    } else {
      await api('POST', '/api/orders', body);
      toast('Order created.', 'success');
    }
    closeModal('form-modal');
    refresh();
  }

  // ── Delete ────────────────────────────────────────────────────
  function openDelete(id, name) {
    deleteTargetId = id;
    document.getElementById('delete-name').textContent = name;
    openModal('delete-modal');
  }

  async function confirmDelete() {
    await api('DELETE', `/api/orders/${deleteTargetId}`);
    closeModal('delete-modal');
    toast('Order deleted.', 'success');
    refresh();
  }

  // ── Utils ─────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) { return String(s).replace(/'/g, "\\'"); }

  // ── Init ──────────────────────────────────────────────────────
  refresh();
</script>
</body>
</html>
